name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -scheme OhmeBar -configuration Debug build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild -scheme OhmeBar test \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO
